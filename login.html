<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
        defer></script>
    <title>Login</title>
</head>

<body>
    <div class="container col-11 col-md-9" id="form-container">
        <div class="row align-items-center gx-4">
            <div class="col-md-6 order-md-2">
                <h2>Faça o login para continuar</h2>
                <form action="#" method="POST">
                    <div class="form-floating mb-3">
                        <input type="email" id="email" name="email" placeholder="Digite o seu email"
                            class="form-control" required>
                        <label for="email">Digite o seu email</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" id="password" name="password" placeholder="Digite a sua senha"
                            class="form-control" required>
                        <label for="password">Digite a sua senha</label>
                    </div>
                    <input type="submit" value="Entrar" class="btn btn-primary">
                </form>
            </div>
            <div class="col-md-6 order-md-1">
                <div class="col-12">
                    <img src="img/undraw_multitasking_i2bv.svg" alt="" class="img-fluid">
                </div>
                <div class="col-12" id="link-container">
                    <a href="register.html">Ainda não tenho Cadastro</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
